set -g default-terminal "xterm-256color"

# make colors inside tmux look the same as outside of tmux
# see https://github.com/tmux/tmux/issues/696
# see https://stackoverflow.com/a/41786092
set-option -ga terminal-overrides ",*:Tc"

bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"

# prevents esc being treated as ALT for a certain period of time after pressing
set -sg escape-time 0

# remap to ctrl+a
#unbind-key C-b
#set-option -g prefix C-a
#bind-key C-a send-prefix

# use tilde/backtic as prefix
unbind C-b
set-option -g prefix `
bind ` send-prefix

# Keep pane contents on the terminal default background; indicate focus in the border.
set -g window-style 'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=default'

# Pane focus: muted borders, heavy white active border, and explicit label.
set -g pane-border-style 'fg=colour238,bg=default'
set -g pane-active-border-style 'fg=white,bg=default,bold'
set -g pane-border-lines heavy
set -g pane-border-status top
set -g @focus_flash_on 0
set -g pane-border-format '#{?pane_active,#{?#{==:#{@focus_flash_on},1},#[fg=black#{,}bg=#e5c07b#{,}bold],#[fg=black#{,}bg=white#{,}bold]} [●] #{pane_index} #[default],#[fg=colour244#{,}bg=default] [○] #{pane_index} #[default]}'

set -g focus-events on
set -g allow-rename on
set -g set-titles on

bind -T copy-mode-vi Y send -X clear-selection \; \
    send -X previous-space \; \
    send -X begin-selection \; \
    send -X next-space-end \; \
    send -X copy-selection-and-cancel

# Track window usage for chooser recency labels
set-hook -g session-window-changed[10] 'run-shell "#{HOME}/.local/bin/tmux-window-usage record #{window_id}"'
set-hook -g client-attached[10] 'run-shell "#{HOME}/.local/bin/tmux-window-usage record #{window_id}"'
set-hook -g client-session-changed[10] 'run-shell "#{HOME}/.local/bin/tmux-window-usage record #{window_id}"'

# Track pane visits for MRU
set-hook -g client-session-changed[20] 'run-shell "#{HOME}/.local/bin/tmux-mru record #{pane_id}"'
set-hook -g session-window-changed[20] 'run-shell "#{HOME}/.local/bin/tmux-mru record #{pane_id}"'

# Flash the active pane title when focus moves.
set-hook -g session-window-changed[30] 'run-shell -b "#{HOME}/.local/bin/tmux-focus-flash"'
set-hook -g client-attached[30] 'run-shell -b "#{HOME}/.local/bin/tmux-focus-flash"'
set-hook -g client-session-changed[30] 'run-shell -b "#{HOME}/.local/bin/tmux-focus-flash"'
set-hook -g client-focus-in[30] 'run-shell -b "#{HOME}/.local/bin/tmux-focus-flash"'
set-hook -g pane-focus-in[30] 'run-shell -b "#{HOME}/.local/bin/tmux-focus-flash"'
set-hook -g after-select-pane[30] 'run-shell -b "#{HOME}/.local/bin/tmux-focus-flash"'
unbind w
bind w run-shell "#{HOME}/.local/bin/tmux-window-usage choose #{pane_id}"
bind W run-shell "#{HOME}/.local/bin/tmux-window-usage choose --all #{pane_id}"
bind R command-prompt -I "#{session_name}" "rename-session '%%'"

# Status bar: muted palette with clear active window
set -g status-style 'fg=#c8ced6,bg=#2f3440'
set -g window-status-style 'fg=#c8ced6,bg=#2f3440'
set -g window-status-current-style 'fg=#f2f4f8,bg=#3f4758,bold'
set -g window-status-format "#I:#W#{?window_flags, #{window_flags},}"
set -g window-status-current-format "#I:#W#{?window_flags, #{window_flags},}"
set -g mode-style 'fg=#f2f4f8,bg=#3f4758'

# Truncate long session names with ellipsis
set -g status-left-length 24
set -g status-left "#{?#{==:#{=18:session_name},#{session_name}},[#{session_name}],[#{=15:session_name}...]} "

# Terminal toolkit — persistent _compose session
bind h run-shell 'if [ "#{session_name}" = "tmux-compose" ]; then tmux select-window -t tmux-compose:history; else $HOME/.local/bin/tmux-mru record #{pane_id} && $HOME/.local/bin/tmux-compose ensure #{pane_id} history && tmux switch-client -t tmux-compose:history; fi'
bind e run-shell 'if [ "#{session_name}" = "tmux-compose" ]; then tmux select-window -t tmux-compose:compose; else $HOME/.local/bin/tmux-mru record #{pane_id} && $HOME/.local/bin/tmux-compose ensure #{pane_id} compose && tmux switch-client -t tmux-compose:compose; fi'
bind t run-shell 'if [ "#{session_name}" = "tmux-compose" ]; then tmux select-window -t tmux-compose:terminals; else $HOME/.local/bin/tmux-mru record #{pane_id} && $HOME/.local/bin/tmux-compose ensure #{pane_id} terminals && tmux switch-client -t tmux-compose:terminals; fi'
bind S run-shell 'if [ "#{session_name}" = "tmux-compose" ]; then tmux select-window -t tmux-compose:status; else $HOME/.local/bin/tmux-mru record #{pane_id} && $HOME/.local/bin/tmux-compose ensure #{pane_id} status && tmux switch-client -t tmux-compose:status; fi'
bind T run-shell 'if [ "#{session_name}" = "tmux-compose" ]; then tmux select-window -t tmux-compose:todo; else $HOME/.local/bin/tmux-mru record #{pane_id} && $HOME/.local/bin/tmux-compose ensure #{pane_id} todo && tmux switch-client -t tmux-compose:todo; fi'
bind b run-shell 'if [ "#{session_name}" = "tmux-compose" ]; then if [ "#{window_name}" = "btop" ]; then tmux switch-client -l; else tmux select-window -t tmux-compose:btop 2>/dev/null || tmux new-window -t tmux-compose -n btop btop; fi; else $HOME/.local/bin/tmux-mru record #{pane_id} && $HOME/.local/bin/tmux-compose ensure #{pane_id} btop && tmux switch-client -t tmux-compose:btop; fi'

# Jumplist navigation (obsolete — kept for reference)
#bind r run-shell '$HOME/.local/bin/tmux-jump back'
#bind f run-shell '$HOME/.local/bin/tmux-jump forward'

# MRU terminal picker
bind j run-shell '$HOME/.local/bin/tmux-mru record #{pane_id}; tmux display-popup -w 95% -h 90% -E "$HOME/.local/bin/tmux-mru pick"'

# Fork current agent context into a new local two-pane window.
bind k run-shell '$HOME/.local/bin/tmux-compose fork-prompt local "#{pane_current_path}" "#{pane_id}"'

# Fork current agent context into a new git worktree two-pane window.
bind K run-shell '$HOME/.local/bin/tmux-compose fork-prompt worktree "#{pane_current_path}" "#{pane_id}"'

# Augmented "create" bindings — inherit cwd from current pane.
# prefix+c: new window without a name prompt.
# prefix+C: new window and prompt for the window name.
# prefix+o: vertical split (matches default prefix+" layout). cwd inherited.
bind c run-shell '$HOME/.local/bin/tmux-compose create-window "#{pane_current_path}" "#{client_name}" no-prompt'
bind C run-shell '$HOME/.local/bin/tmux-compose create-window "#{pane_current_path}" "#{client_name}" prompt'
bind o run-shell '$HOME/.local/bin/tmux-compose create-split "#{pane_current_path}"'

# Disable the bell entirely — no flag in the status, no style flip, no
# session-level alert. Some processes (test runners, etc.) emit BEL bytes
# that are not actionable; ignore them.
set -g monitor-bell off
set -g bell-action none
set -g visual-bell off
